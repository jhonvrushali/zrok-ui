name: Build & Push Docker Images to GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push Dashboard ─────────────────────────
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zrok-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/zrok-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Server ────────────────────────────
      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zrok-server:latest
            ghcr.io/${{ github.repository_owner }}/zrok-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print Deploy Info
        run: |
          echo "✅ Images pushed successfully!"
          echo "Dashboard: ghcr.io/${{ github.repository_owner }}/zrok-dashboard:latest"
          echo "Server:    ghcr.io/${{ github.repository_owner }}/zrok-server:latest"
